  text: 'Ghostty lets you control the opacity of unfocused splits.


    Just add this to ~/.config/ghostty/config:

    unfocused-split-opacity = 0.85


    Super useful when working across multiple panes, you always know where your focus
    is.


    If the opacity doesn''t load on startup, hit cmd+shift+, to '
