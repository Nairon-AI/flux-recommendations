name: superset
category: application
tagline: "Run 10+ parallel coding agents on your machine"

description: |
  Superset is an open-source Mac terminal that orchestrates CLI-based coding agents (Claude Code, Codex, Aider, OpenCode) in parallel. Each agent runs in its own isolated git worktree. Features include persistent terminal sessions, built-in diff viewer, and IDE integration (VS Code, Cursor, JetBrains, Xcode).

use_cases:
  - Run 10+ coding agents in parallel
  - Isolate agent work with git worktree per agent
  - Survive crashes with persistent daemon sessions
  - Review changes with built-in diff viewer
  - Forward ports from agent workspaces

prerequisites:
  - macOS
  - At least one CLI coding agent (Claude Code, Codex, Aider, OpenCode)

install:
  type: manual
  command: |
    # Download from https://superset.sh/
    # Open source: https://github.com/nicholasgriffintn/superset

verification:
  type: manual
  success_indicator: "Superset terminal launches and can create workspaces"

