name: rivet-actors-serverless-stateful-primiti
category: tool
tagline: Serverless primitive for stateful workloads like AI agents with built-in
  persist
description: 'Rivet Actors provide a serverless primitive for stateful workloads,
  particularly AI agents. Each actor runs independently with in-memory state, SQLite
  persistence, WebSockets, queues, and scheduling capabilities. The platform is designed
  for long-lived processes that can hibernate when idle and scale infinitely.


  **Flux Impact:** Enables persistent, stateful AI agents that maintain context across
  sessions and scale automatically. This addresses a key gap in Agentic SDLC where
  agents lose context between interactions.'
use_cases:
- Add rivet-dev/skills to agent skillset for deployment patterns
- Create actor templates for common agent workflows
- Document integration patterns with Claude Code sessions
- Test actor-based agent deployment in development workflows
