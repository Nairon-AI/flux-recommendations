description:
  "Hamster is a product delivery platform that combines team collaboration
  with AI assistance to help teams refine ideas, align on requirements, and execute
  builds. It integrates with existing tools like GitHub, Notion, Linear, and Jira
  to gather context and manage the product development process.


  **Flux Impact:** Could enhance the Planning phase of Agentic SDLC by providing better
  team alignment on requirements before AI implementation begins. However, needs clearer
  differentiation from existing tools to justify adoption."
