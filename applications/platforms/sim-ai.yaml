name: sim-ai
category: application
tagline: Visual drag-and-drop AI agent workflow builder
description: |
  Sim is an open-source platform for building and deploying AI agent workflows
  visually. Think "Figma for AI workflows" - drag, drop, and connect agents,
  tools, and blocks on a canvas, then run them instantly.

  ## Key Features

  - **Visual Canvas** - Design workflows by connecting nodes
  - **Copilot** - Generate nodes and fix errors from natural language
  - **100+ Integrations** - OpenAI, Anthropic, Gemini, Groq, Ollama, and more
  - **Vector Databases** - Upload docs, let agents answer from your content
  - **Real-time Execution** - See workflows run as you build
  - **Self-hostable** - Run on your own infrastructure

  ## Quick Start

  ### Cloud (Fastest)
  Go to [sim.ai](https://sim.ai) and start building

  ### Self-hosted (NPM)
  ```bash
  npx simstudio
  # → http://localhost:3000
  ```
  Requires Docker running.

  ### Self-hosted (Docker Compose)
  ```bash
  git clone https://github.com/simstudioai/sim
  cd sim
  docker compose up
  ```

  ## Use Cases

  - Build chatbots with RAG over your documents
  - Create multi-agent systems with specialized roles
  - Automate workflows across Discord, Slack, email
  - Prototype AI features before coding them
  - Connect local models via Ollama for privacy

  ## Why Sim vs n8n?

  - AI-native design (built for agents, not just automation)
  - Copilot for faster workflow creation
  - Better UX for agent-specific patterns
  - Works with local models out of the box

use_cases:
