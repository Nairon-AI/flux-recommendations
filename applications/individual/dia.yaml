name: dia
category: application
tagline: AI-native browser - chat with your tabs, context-aware assistance
description: 'Dia is an AI-first browser from The Browser Company. Unlike browsers
  with

  AI bolted on, Dia embeds AI into every aspect of browsing. Chat with all

  your open tabs simultaneously, get writing help in any text box.


  Learns your work patterns over time. Memory persists across sessions.

  Skills provide shortcuts (/cite, /fact-check, /flashcards). After a week,

  you won''t want to go back.

  '
use_cases:
- Research across multiple tabs with AI synthesis
- Writing assistance directly in any text field
- Summarizing and fact-checking content
- Context-aware help that knows your projects
- Students: flashcards, citations, study guides
prerequisites:
- macOS or Windows
- Free account (Pro $20/month for more)
install:
  type: manual
  command: '# Download from website

    open https://www.diabrowser.com


    # Set up:

    # 1. Sign in and grant permissions

    # 2. Learn Cmd+E to open Chat

    # 3. Try @mentioning tabs in queries

    # 4. Explore Skills (/cite, /fact-check, etc.)

    '
verification:
  type: manual
  test_command: Press Cmd+E to open Chat, ask about open tabs
  success_indicator: Dia responds with context from your tabs
resources:
- url: https://www.diabrowser.com
  type: homepage
- url: https://www.diabrowser.com/getting-started
  type: docs
added_date: 2026-02-21
source: manual
ratings:
  usefulness: 5
  setup_difficulty: 1
tags:
- browser
- ai-native
- productivity
- research
- writing
- macos
- windows
sdlc_phase: implementation
solves: Browser context switching - losing focus jumping between tabs and searching
pricing:
  model: freemium
  details: 'Free tier available. Pro: $20/mo for more AI usage'
