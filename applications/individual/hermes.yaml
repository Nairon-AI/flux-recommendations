name: hermes
category: application
tagline: AI markdown editor that helps develop ideas without writing for you
description: |
  Hermes is an intelligent markdown editor powered by Claude that focuses on helping
  users develop their ideas deeper rather than writing content for them.
  
  Key features:
  - AI editor that won't write for you - helps you think deeper
  - Multiple pages for ideas, outlines, and drafts
  - Publish directly online
  - Powered by Claude
  - Open source
  
  The key insight: AI should help you develop better ideas, not replace your thinking.
  Hermes encourages deeper exploration rather than quick content generation.
  
use_cases:
  - Develop technical specifications and ADRs
  - Plan complex architecture decisions
  - Write documentation with AI guidance
  - Organize ideas into structured outlines

