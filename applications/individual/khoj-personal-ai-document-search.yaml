description: 'Khoj is an open-source personal AI assistant that indexes your documents
  across multiple platforms (Notion, Obsidian, Google Docs, PDFs) and provides question
  answering with citations. It supports both cloud and self-hosted deployment with
  local models like Llama and Mistral, maintaining conversation memory across sessions.


  **Flux Impact:** Enhances our Agentic SDLC by providing persistent, searchable context
  across all project documentation and conversations, reducing context amnesia between
  sessions'
use_cases:
- Evaluate Khoj for team documentation indexing
- Create Khoj MCP server for Claude Code integration
- Test offline mode with local models for sensitive codebases
- Integrate with .flux/memory/ for persistent knowledge management
