name: cursor-multitask
category: application
tagline: Cursor's agent orchestration feature for parallel AI coding tasks
description: A new feature in Cursor IDE that allows the main AI agent to split complex
  coding work into smaller asynchronous subagents. This keeps the main chat context
  clean while parallel agents handle specific messy tasks independently, improving
  workflow organization and context management.
