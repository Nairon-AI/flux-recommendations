name: sandcastle
category: application
tagline: Orchestrates locally sandboxed coding agents in TypeScript with Docker
description: Sandcastle enables running AI coding agents (Claude, Codex, OpenCode)
  in isolated Docker containers while working offline. Changes made in the sandbox
  are automatically patched back to the host system, allowing safe experimentation
  with AI-generated code modifications.
