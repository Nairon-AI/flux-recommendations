name: ona
category: application
tagline: AI software engineers that run autonomously in your infrastructure
description: |
  Ona is an AI engineering workforce platform that provides AI software engineers
  working across the entire development lifecycle. Unlike traditional AI assistants,
  Ona agents execute autonomously in the background - from task to pull request.

  ## Key Features

  - **Background Agents** - Task in, pull request out. Agents execute end-to-end
  - **Automations** - Agent fleets at scale, triggered on PRs, schedules, or webhooks
  - **Connected Environments** - Full cloud environments with tools, network access, permissions
  - **Governance** - VPC deployment, audit trails, scoped credentials, kernel-level policy enforcement
  - **Enterprise-Ready** - SOC 2, GDPR compliant, trusted by Fortune 500

  ## Use Cases

  ### Code Migration & Modernization
  Migrate hundreds of repos in parallel - COBOL, Java & framework upgrades, CI pipelines.
  Ona does the work, you review the PRs.

  ### AI Code Review
  Compiles, runs tests, and reviews in a real environment - not just pattern scanning.

  ### Automated CVE Remediation
  Remediates what your scanner finds across hundreds of repos in isolated environments.
  Tested, with PRs ready for review.

  ## Why Ona?

  - 4x productivity increase (customer reported)
  - 83% of PRs co-authored by Ona (top-100 global company case study)
  - 400+ Python repos modernized in 6 months
  - 90-95% of migration work automated

  ## Enterprise Customers

  BNY, Blackstone, Vanta, Pearson, EquipmentShare, Hargreaves Lansdown

use_cases:
  - Large-scale code migrations (COBOL to modern languages)
  - Framework upgrades across multiple repositories
  - Automated security vulnerability remediation
  - AI-powered code review with real environment testing
  - CI/CD pipeline modernization
  - Backlog ticket automation at scale

prerequisites:
  - Enterprise account for full features
  - Repository access (GitHub, GitLab, etc.)

