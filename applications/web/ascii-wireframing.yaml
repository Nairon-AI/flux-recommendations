name: ascii-wireframing
category: application
tagline: Token-efficient wireframing for AI with ASCII art tools
description: |
  ASCII wireframing tools let you create UI mockups in plain text that AI
  can understand perfectly. More token-efficient than images, more precise
  than verbal descriptions, and version-controllable in git.

  ## Why ASCII Wireframes for AI?

  - **Token-efficient**: Plain text uses far fewer tokens than images
  - **Unambiguous**: AI interprets ASCII layouts with high accuracy
  - **Version-controllable**: Diff and track changes in git
  - **Copy-paste ready**: Works in any text environment
  - **Forces focus**: Structure over aesthetics

  ## Recommended Tools

  ### ASCIIFlow (asciiflow.com)
  Free web-based tool for drawing ASCII diagrams:
  - Boxes, lines, arrows, freeform drawing
  - Export to plain text
  - Keyboard-driven workflow

  ### Mockdown (mockdown.design)
  ASCII wireframe generator specifically for AI:
  - Designed for AI consumption
  - Quick layout prototyping
  - Export formats optimized for prompts

  ## Example Workflow

  1. **Create ASCII wireframe** in ASCIIFlow or Mockdown
  ```
  +------------------+------------------+
  |     HEADER       |     LOGO         |
  +------------------+------------------+
  |                                     |
  |  +--------+  +--------+  +--------+ |
  |  | Card 1 |  | Card 2 |  | Card 3 | |
  |  +--------+  +--------+  +--------+ |
  |                                     |
  +-------------------------------------+
  |            FOOTER                   |
  +-------------------------------------+
  ```

  2. **Paste into AI prompt**
  ```
  Build this layout using Tailwind CSS:
  [ASCII wireframe]
  ```

  3. **AI generates accurate code**
  The structured format leads to more accurate implementations.

use_cases:
  - Quick UI mockups for AI coding assistants
  - Documentation that lives in code
  - Planning phase wireframes
  - README diagrams

