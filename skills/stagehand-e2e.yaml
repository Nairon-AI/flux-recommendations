name: stagehand-e2e
category: skill
tagline: "AI-powered browser automation - self-healing tests with Playwright"

description: |
  Stagehand adds AI primitives to Playwright: act(), extract(), observe().
  Write tests in natural language, let AI handle selectors. Tests self-heal
  when UI changes - no more brittle CSS selectors breaking overnight.
  
  Hybrid approach: mix deterministic Playwright commands with AI-powered
  Stagehand methods in the same script. Best of both worlds.

use_cases:
  - E2E tests that don't break on UI changes
  - Scraping dynamic/complex websites
  - Automating workflows across web apps
  - Extracting structured data from pages
  - Testing AI-generated UIs

prerequisites:
  - Node.js 18+
  - OpenAI or Anthropic API key
  - Playwright installed

install:
  type: skill
  command: |
    # Install from skills.sh (if available)
    # Or manually:
    
    # Install stagehand
    npm install @browserbasehq/stagehand
    
    # Install the Claude Code skill
    # Download from skills.sh or copy SKILL.md to ~/.claude/skills/

verification:
  type: manual
  test_command: "Run a simple stagehand test with act() and extract()"
  success_indicator: "AI successfully interacts with page elements"

resources:
