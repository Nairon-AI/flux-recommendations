name: ui-skills
category: skill
tagline: "15+ skills to polish agent-built interfaces - accessibility, motion, design"

description: |
  UI Skills is a curated collection of Claude skills for building polished interfaces.
  Install individual skills or the full set.
  
  Core skills:
  - baseline-ui: Validates animations, typography, accessibility, layout patterns
  - fixing-accessibility: ARIA labels, keyboard nav, focus management, contrast
  - fixing-metadata: SEO, Open Graph, Twitter cards, structured data
  - fixing-motion-performance: Animation perf, compositor properties, jank fixes
  
  Design skills:
  - frontend-design: Distinctive, production-grade UI (anti-generic)
  - interface-design: Dashboards, admin panels, SaaS apps
  - interaction-design: Microinteractions, motion design, feedback patterns
  - 12-principles-of-animation: Disney animation principles for web
  
  Pattern skills:
  - tailwind-css-patterns: Utility-first best practices
  - wcag-audit-patterns: WCAG 2.2 accessibility audits
  - web-design-guidelines: Vercel-style design system compliance

use_cases:
  - Auditing and fixing accessibility issues
  - Polishing animation performance
  - Building distinctive dashboard UIs
  - Enforcing design consistency
  - SEO and metadata compliance

prerequisites:
  - Claude Code, Cursor, OpenCode, or similar
  - Node.js for npx installer

install:
  type: skill
  command: |
    # Install all skills
    npx skills add ibelick/ui-skills
    
    # Or install specific skills
    npx ui-skills add baseline-ui
    npx ui-skills add fixing-accessibility
    npx ui-skills add frontend-design
    npx ui-skills add interaction-design

verification:
  type: manual
  test_command: "/baseline-ui review src/"
  success_indicator: "Skill audits components and reports issues"

resources:
  - url: https://www.ui-skills.com
    type: homepage
  - url: https://github.com/ibelick/ui-skills
    type: github

added_date: 2026-02-23
source: manual

ratings:
  usefulness: 5
  setup_difficulty: 1

tags:
  - frontend
  - ui
  - accessibility
  - motion
  - design
  - tailwind
  - wcag
  - seo
  - dashboard
  - polish

sdlc_phase: review
solves: "Agent-built UI lacks polish - accessibility gaps, janky animations, inconsistent design"

pricing:
  model: open-source
  details: "Free and open-source (MIT)"
