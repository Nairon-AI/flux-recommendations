name: hegelian-dialectic-philosophical-thinkin
category: skill
tagline: A systematic skill for AI agents to apply Hegelian dialectic thinking process
  en
description: 'This skill implements a structured Hegelian dialectic process for AI
  agents, combining classical thesis-antithesis-synthesis with Boyd''s ''Destruction
  and Creation'' theory. It provides a 7-phase framework for systematic thinking that
  includes destructive deduction, creative synthesis, and reversibility checks.


  **Flux Impact:** Enhances our Agentic SDLC by providing agents with structured philosophical
  reasoning capabilities, particularly valuable for complex architectural decisions
  and when synthesizing conflicting requirements or approaches'
use_cases:
- Download and evaluate the skill implementation
- Test integration with flux-plan and flux-work commands
- Create examples of dialectical thinking in software architecture decisions
- Document use cases where philosophical reasoning improves agent outcomes
