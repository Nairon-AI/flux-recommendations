name: beads
category: skill
tagline: "Lightweight task tracking that persists across sessions"

description: |
  Beads (bd) is a minimal task tracker designed for AI-augmented workflows.
  Create issues, track dependencies, and maintain state across Claude sessions.
  
  Unlike TodoWrite, beads persists to disk and syncs with git. Perfect for
  multi-session projects where you need to pick up where you left off.

use_cases:
  - Tracking tasks across multiple Claude sessions
  - Managing dependencies between work items
  - Keeping a persistent backlog
  - Syncing task state with git

prerequisites:
  - Python 3.8+
  - Git repository (optional, for sync)

install:
  type: skill
  command: |
    # Clone and set up beads
    git clone https://github.com/Nairon-AI/beads.git ~/.beads
    
    # Add to PATH (bash/zsh)
    echo 'export PATH="$HOME/.beads/bin:$PATH"' >> ~/.zshrc
    source ~/.zshrc
    
    # Initialize in your project
    cd your-project
    bd init

verification:
  type: command_exists
  test_command: "bd --version"
  success_indicator: "Should show beads version"

resources:
  - url: https://github.com/Nairon-AI/beads
    type: github

added_date: 2026-02-21
source: manual

ratings:
  usefulness: 5
  setup_difficulty: 2

tags:
  - task-tracking
  - persistence
  - workflow
  - git-sync
