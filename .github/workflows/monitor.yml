name: Monitor X Accounts

on:
  schedule:
    # Run daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Hours to look back'
        default: '24'
        type: string
      dry_run:
        description: 'Dry run (no commits)'
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Run monitor
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: |
          ARGS="--since 24"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.since_hours }}" ] && [ "${{ inputs.since_hours }}" != "24" ]; then
            ARGS="--since ${{ inputs.since_hours }}"
          fi
          
          python scripts/monitor.py $ARGS
      
      - name: Commit changes
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "Flux Bot"
          git config user.email "flux-bot@nairon.ai"
          
          # Check for any changes
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "feat: daily X monitor - $(date +%Y-%m-%d)
          
          Auto-collected tweets from AI dev community.
          - Mentions added to matching recommendations
          - Unmatched tweets saved to pending/"
            
            git push
            echo "Changes committed and pushed"
          else
            echo "No changes to commit"
          fi
