name: Monitor X Accounts

on:
  schedule:
    # Run daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Hours to look back'
        default: '24'
        type: string
      dry_run:
        description: 'Dry run (no PRs)'
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Run monitor
        id: monitor
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: |
          ARGS="--since 24"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.since_hours }}" ] && [ "${{ inputs.since_hours }}" != "24" ]; then
            ARGS="--since ${{ inputs.since_hours }}"
          fi
          
          python scripts/monitor.py $ARGS
          
          # Check if any files were created in discoveries/
          if [ -n "$(ls -A discoveries/*.md 2>/dev/null)" ]; then
            echo "has_discoveries=true" >> $GITHUB_OUTPUT
          else
            echo "has_discoveries=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create PR for discoveries
        if: steps.monitor.outputs.has_discoveries == 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config user.name "Flux Bot"
          git config user.email "flux-bot@nairon.ai"
          
          # Create branch
          BRANCH="discoveries/$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          
          # Add and commit
          git add discoveries/
          git add .monitor_state.json
          git commit -m "feat: tweets from monitored accounts - $(date +%Y-%m-%d)

          Daily collection from AI dev community accounts.
          Review for workflow tips worth adding to recommendations."
          
          # Push and create PR
          git push -u origin "$BRANCH"
          
          gh pr create \
            --title "Daily tweets - $(date +%Y-%m-%d)" \
            --body "## Daily Tweet Collection

          Tweets from monitored AI dev accounts in the last 24 hours.

          **Review for:**
          - New tools worth recommending
          - Workflow tips to document
          - Interesting patterns

          If you find something worth adding, create a recommendation YAML in the appropriate folder.

          ---
          *Generated by Flux X Monitor*" \
            --label "discovery"
