name: Slack Inbox

on:
  repository_dispatch:
    types: [slack-tweet]

permissions:
  contents: read
  issues: write

jobs:
  process-tweet:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Create issue from tweet
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TWEET_URL: ${{ github.event.client_payload.tweet_url }}
        run: python scripts/slack-inbox.py
