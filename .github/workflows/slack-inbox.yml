name: Slack Inbox

on:
  repository_dispatch:
    types: [slack-tweet]

permissions:
  contents: read
  issues: write

jobs:
  process-tweet:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Fetch and analyze tweet
        id: tweet
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWEET_URL: ${{ github.event.client_payload.tweet_url }}
        run: |
          python3 << 'EOF' > /tmp/tweet.json
          import json
          import os
          import re
          import urllib.request
          
          API_BASE = "https://api.twitterapi.io"
          
          def extract_tweet_id(url):
              for pattern in [r"twitter\.com/\w+/status/(\d+)", r"x\.com/\w+/status/(\d+)"]:
                  match = re.search(pattern, url)
                  if match:
                      return match.group(1)
              return None
          
          def fetch_tweet(tweet_id, api_key):
              url = f"{API_BASE}/twitter/tweets?tweet_ids={tweet_id}"
              req = urllib.request.Request(url)
              req.add_header("X-API-Key", api_key)
              req.add_header("User-Agent", "FluxInbox/1.0")
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      data = json.loads(resp.read().decode())
                      tweets = data.get("tweets", [])
                      return tweets[0] if tweets else None
              except Exception as e:
                  return None
          
          tweet_url = os.environ["TWEET_URL"]
          api_key = os.environ["TWITTER_API_KEY"]
          
          tweet_id = extract_tweet_id(tweet_url)
          tweet = fetch_tweet(tweet_id, api_key) if tweet_id else None
          
          if tweet:
              result = {
                  "text": tweet.get("text", ""),
                  "author": tweet.get("author", {}).get("userName", "unknown"),
                  "author_name": tweet.get("author", {}).get("name", "Unknown"),
                  "likes": tweet.get("likeCount", 0),
                  "retweets": tweet.get("retweetCount", 0),
                  "url": tweet_url,
              }
          else:
              result = {"error": "Could not fetch tweet", "url": tweet_url}
          
          print(json.dumps(result))
          EOF
          
          # Extract for GitHub outputs
          TEXT=$(jq -r '.text // "N/A"' /tmp/tweet.json | head -c 500)
          AUTHOR=$(jq -r '.author // "unknown"' /tmp/tweet.json)
          AUTHOR_NAME=$(jq -r '.author_name // "Unknown"' /tmp/tweet.json)
          LIKES=$(jq -r '.likes // 0' /tmp/tweet.json)
          
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "author_name=$AUTHOR_NAME" >> $GITHUB_OUTPUT
          echo "likes=$LIKES" >> $GITHUB_OUTPUT
          
          # Multi-line text needs special handling
          echo "text<<EOFTEXT" >> $GITHUB_OUTPUT
          echo "$TEXT" >> $GITHUB_OUTPUT
          echo "EOFTEXT" >> $GITHUB_OUTPUT

      - name: Create Issue
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TWEET_URL: ${{ github.event.client_payload.tweet_url }}
        run: |
          AUTHOR="${{ steps.tweet.outputs.author }}"
          AUTHOR_NAME="${{ steps.tweet.outputs.author_name }}"
          LIKES="${{ steps.tweet.outputs.likes }}"
          TEXT="${{ steps.tweet.outputs.text }}"
          
          # Create issue title from first ~60 chars of tweet
          TITLE_TEXT=$(echo "$TEXT" | tr '\n' ' ' | cut -c1-60)
          TITLE="Inbox: ${TITLE_TEXT}..."
          
          # Create issue body
          cat > /tmp/issue.md << 'EOFBODY'
          ## Tweet
          
          > TWEET_TEXT_PLACEHOLDER
          
          **Author:** [@AUTHOR_PLACEHOLDER](https://x.com/AUTHOR_PLACEHOLDER) (AUTHOR_NAME_PLACEHOLDER)
          **Engagement:** LIKES_PLACEHOLDER likes
          **Link:** TWEET_URL_PLACEHOLDER
          
          ---
          
          ## Review Questions
          
          - [ ] Is this relevant to AI-augmented development workflows?
          - [ ] What category would this belong in? (mcp, cli-tool, skill, workflow-pattern, etc.)
          - [ ] What's the actual tool/technique being discussed?
          - [ ] Should we create a recommendation for this?
          
          ## Notes
          
          _Add your analysis here..._
          
          ---
          *From Slack inbox*
          EOFBODY
          
          # Replace placeholders
          sed -i "s|TWEET_TEXT_PLACEHOLDER|$TEXT|g" /tmp/issue.md
          sed -i "s|AUTHOR_PLACEHOLDER|$AUTHOR|g" /tmp/issue.md
          sed -i "s|AUTHOR_NAME_PLACEHOLDER|$AUTHOR_NAME|g" /tmp/issue.md
          sed -i "s|LIKES_PLACEHOLDER|$LIKES|g" /tmp/issue.md
          sed -i "s|TWEET_URL_PLACEHOLDER|$TWEET_URL|g" /tmp/issue.md
          
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/issue.md \
            --label "inbox"
