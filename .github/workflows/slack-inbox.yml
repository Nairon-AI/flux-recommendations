name: Slack Inbox

on:
  repository_dispatch:
    types: [slack-tweet]

permissions:
  contents: read
  issues: write

jobs:
  process-tweet:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone flux plugin repo
        uses: actions/checkout@v4
        with:
          repository: Nairon-AI/flux
          path: flux-plugin
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Analyze tweet and create issue
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          TWEET_URL: ${{ github.event.client_payload.tweet_url }}
          RECOMMENDATIONS_PATH: .
          FLUX_PLUGIN_PATH: flux-plugin
        run: python scripts/slack-inbox.py
