name: Slack Inbox

on:
  repository_dispatch:
    types: [slack-tweet, slack-url]

permissions:
  contents: write
  issues: write

jobs:
  process-url:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Clone Flux repo
        uses: actions/checkout@v4
        with:
          repository: Nairon-AI/flux
          path: flux
          token: ${{ secrets.PAT_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install youtube-transcript-api requests pyyaml
      
      - name: Analyze URL and create issue
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          URL: ${{ github.event.client_payload.url || github.event.client_payload.tweet_url }}
          SLACK_CHANNEL: ${{ github.event.client_payload.slack_channel }}
          SLACK_TS: ${{ github.event.client_payload.slack_ts }}
          RECOMMENDATIONS_PATH: .
          FLUX_PLUGIN_PATH: flux
        run: python scripts/slack-inbox.py
