name: Model Eval Radar

on:
  schedule:
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back for releases"
        default: "7"
        type: string
      dry_run:
        description: "Dry run (no PR)"
        default: false
        type: boolean
      detect_only:
        description: "Only detect release announcements"
        default: false
        type: boolean

concurrency:
  group: model-eval-radar
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run model eval radar
        id: radar
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: |
          set -euo pipefail
          ARGS="--since-days ${{ inputs.since_days || '7' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.detect_only }}" = "true" ]; then
            ARGS="$ARGS --detect-only"
          fi

          python scripts/model-eval-radar.py $ARGS 2>&1 | tee /tmp/model-eval.log

          RELEASES=$(grep "Detected releases:" /tmp/model-eval.log | grep -oE '[0-9]+' || echo "0")
          STARTED=$(grep "New evaluation windows started:" /tmp/model-eval.log | grep -oE '[0-9]+' || echo "0")
          COMPLETED=$(grep "Evaluations completed this run:" /tmp/model-eval.log | grep -oE '[0-9]+' || echo "0")

          echo "releases=$RELEASES" >> $GITHUB_OUTPUT
          echo "started=$STARTED" >> $GITHUB_OUTPUT
          echo "completed=$COMPLETED" >> $GITHUB_OUTPUT

      - name: Create PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "Flux Model Eval Radar"
          git config user.email "flux-model-radar@nairon.ai"

          DATE=$(date +%Y-%m-%d)
          BRANCH="model-eval/$DATE"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            BRANCH="model-eval/$DATE-$(date +%H%M)"
          fi

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "model-eval: releases ${{ steps.radar.outputs.releases }}, started ${{ steps.radar.outputs.started }}, completed ${{ steps.radar.outputs.completed }} - $DATE"
          git push -u origin "$BRANCH"

          cat > /tmp/pr-body.md << EOF
          ## Summary

          | Metric | Count |
          |--------|-------|
          | Release announcements detected | ${{ steps.radar.outputs.releases }} |
          | New 3-day evaluations started | ${{ steps.radar.outputs.started }} |
          | Evaluations completed (reports generated) | ${{ steps.radar.outputs.completed }} |

          ### Files Updated

          \\`evaluation-in-progress/\\` and \\`model-evaluations/\\` may contain new artifacts.

          ---

          *Generated by Model Eval Radar*
          EOF

          gh pr create --title "Model Eval Radar: ${{ steps.radar.outputs.releases }} releases, ${{ steps.radar.outputs.completed }} reports" --body-file /tmp/pr-body.md
