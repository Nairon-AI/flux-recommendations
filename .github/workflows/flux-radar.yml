name: Flux Radar

on:
  schedule:
    # Run daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Hours to look back'
        default: '24'
        type: string
      dry_run:
        description: 'Dry run (no PR)'
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Run X monitor
        id: monitor
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--since ${{ inputs.since_hours || '24' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          # Capture output
          python scripts/monitor.py $ARGS 2>&1 | tee /tmp/monitor.log
          
          # Parse stats from output
          MATCHED=$(grep "Matched to recommendations:" /tmp/monitor.log | grep -oE '[0-9]+' || echo "0")
          NEW_RECS=$(grep "New recommendations created:" /tmp/monitor.log | grep -oE '[0-9]+' || echo "0")
          
          echo "matched=$MATCHED" >> $GITHUB_OUTPUT
          echo "new_recs=$NEW_RECS" >> $GITHUB_OUTPUT

      - name: Auto-commit (fully autonomous)
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          MATCHED="${{ steps.monitor.outputs.matched }}"
          NEW_RECS="${{ steps.monitor.outputs.new_recs }}"
          DATE=$(date +%Y-%m-%d)
          
          git config user.name "Flux Radar"
          git config user.email "flux-radar@nairon.ai"
          
          # FULLY AUTONOMOUS LOGIC:
          # 1. Social proof mentions for existing recommendations → auto-commit
          # 2. AI evaluates unmatched tweets → creates new recommendations if valuable
          # 3. Low-value tweets → discarded (no manual review needed)
          
          TOTAL=$((MATCHED + NEW_RECS))
          
          if [ "$TOTAL" -gt 0 ]; then
            echo "Auto-committing: $MATCHED social proof mentions + $NEW_RECS new recommendations"
            
            # Stage all recommendation files (not pending/)
            git add -A
            git reset -- pending/ 2>/dev/null || true
            
            # Also update state file
            git add .monitor_state.json 2>/dev/null || true
            
            if [ -n "$(git diff --cached --name-only)" ]; then
              # Build smart commit message
              if [ "$MATCHED" -gt 0 ] && [ "$NEW_RECS" -gt 0 ]; then
                MSG="radar: $MATCHED mentions + $NEW_RECS new recommendations - $DATE"
              elif [ "$MATCHED" -gt 0 ]; then
                MSG="radar: $MATCHED social proof mentions - $DATE"
              else
                MSG="radar: $NEW_RECS new AI-discovered recommendations - $DATE"
              fi
              
              git commit -m "$MSG"
              git push origin main
              echo "Committed: $MSG"
            else
              echo "No changes to commit after filtering"
            fi
          else
            echo "Nothing valuable found today (all tweets rejected by AI evaluation)"
            
            # Only update state file to track seen tweets
            git checkout -- . 2>/dev/null || true
            git add .monitor_state.json 2>/dev/null || true
            
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "radar: update state (nothing valuable) - $DATE"
              git push origin main
            fi
          fi
          
          echo "Radar run complete - fully autonomous, zero human input required"
