name: Flux Radar

on:
  schedule:
    # Run daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Hours to look back'
        default: '24'
        type: string
      dry_run:
        description: 'Dry run (no PR)'
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Run X monitor
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: |
          ARGS="--since ${{ inputs.since_hours || '24' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/monitor.py $ARGS

      - name: Create PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "Flux Radar"
          git config user.email "flux-radar@nairon.ai"

          DATE=$(date +%Y-%m-%d)
          BRANCH="radar/$DATE"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            BRANCH="radar/$DATE-$(date +%H%M)"
          fi

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "radar: daily signal - $DATE"
          git push -u origin "$BRANCH"

          cat > /tmp/pr-body.md << 'PREOF'
          ## Daily Signal Collection

          **Sources:** X/Twitter monitored accounts

          ### Review Checklist
          - [ ] Mentions are relevant to recommendations
          - [ ] Pending tweets reviewed for new candidates

          ---
          *Generated by Flux Radar*
          PREOF

          gh pr create --title "Radar: $DATE" --body-file /tmp/pr-body.md
