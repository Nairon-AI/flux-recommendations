name: Flux Radar

on:
  schedule:
    # Run daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Hours to look back'
        default: '24'
        type: string
      dry_run:
        description: 'Dry run (no PR)'
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Run X monitor
        id: monitor
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
        run: |
          ARGS="--since ${{ inputs.since_hours || '24' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          # Capture output
          python scripts/monitor.py $ARGS 2>&1 | tee /tmp/monitor.log
          
          # Parse stats from output
          MATCHED=$(grep "Matched to recommendations:" /tmp/monitor.log | grep -oE '[0-9]+' || echo "0")
          PENDING=$(grep "Saved to pending:" /tmp/monitor.log | grep -oE '[0-9]+' || echo "0")
          
          echo "matched=$MATCHED" >> $GITHUB_OUTPUT
          echo "pending=$PENDING" >> $GITHUB_OUTPUT

      - name: Create PR
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "Flux Radar"
          git config user.email "flux-radar@nairon.ai"

          DATE=$(date +%Y-%m-%d)
          BRANCH="radar/$DATE"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            BRANCH="radar/$DATE-$(date +%H%M)"
          fi

          git checkout -b "$BRANCH"
          git add -A
          
          # Get list of updated recommendation files
          UPDATED_RECS=$(git diff --cached --name-only | grep -E '\.yaml$' | grep -v 'pending/' | grep -v 'schema.yaml' | grep -v 'accounts.yaml' | grep -v '.monitor_state.json' || true)
          PENDING_FILE=$(git diff --cached --name-only | grep 'pending/' || true)
          
          # Build commit message
          git commit -m "radar: ${{ steps.monitor.outputs.matched }} mentions, ${{ steps.monitor.outputs.pending }} pending - $DATE"
          git push -u origin "$BRANCH"
          
          # Build PR title
          MATCHED="${{ steps.monitor.outputs.matched }}"
          PENDING="${{ steps.monitor.outputs.pending }}"
          
          if [ "$MATCHED" -gt 0 ] && [ "$PENDING" -gt 0 ]; then
            TITLE="Radar: ${MATCHED} social proof mentions + ${PENDING} new discoveries"
          elif [ "$MATCHED" -gt 0 ]; then
            TITLE="Radar: ${MATCHED} social proof mentions added"
          elif [ "$PENDING" -gt 0 ]; then
            TITLE="Radar: ${PENDING} new tool discoveries to review"
          else
            TITLE="Radar: $DATE collection"
          fi
          
          # Build PR body
          cat > /tmp/pr-body.md << 'EOFHEADER'
          ## Summary
          EOFHEADER
          
          echo "" >> /tmp/pr-body.md
          echo "| Metric | Count |" >> /tmp/pr-body.md
          echo "|--------|-------|" >> /tmp/pr-body.md
          echo "| Mentions added to recommendations | $MATCHED |" >> /tmp/pr-body.md
          echo "| New discoveries (pending review) | $PENDING |" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          
          # Show recommendations that got mentions
          echo "## Recommendations Updated" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          
          if [ -n "$UPDATED_RECS" ]; then
            echo "$UPDATED_RECS" | while read -r file; do
              name=$(basename "$file" .yaml)
              echo "- \`$name\`" >> /tmp/pr-body.md
            done
          else
            echo "_No recommendations updated this run_" >> /tmp/pr-body.md
          fi
          
          echo "" >> /tmp/pr-body.md
          
          # Show pending tweets with details
          echo "## Pending Tweets (New Discoveries)" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          
          if [ -n "$PENDING_FILE" ] && [ -f "$PENDING_FILE" ]; then
            echo "These tweets didn't match existing recommendations - review for new tools to add:" >> /tmp/pr-body.md
            echo "" >> /tmp/pr-body.md
            
            # Parse pending YAML and show tweets
            python3 - "$PENDING_FILE" >> /tmp/pr-body.md << 'PYTHONEOF'
          import yaml
          import sys
          
          try:
              with open(sys.argv[1]) as f:
                  tweets = yaml.safe_load(f) or []
              
              for t in tweets[:10]:  # Show max 10
                  author = t.get('author', 'unknown')
                  text = t.get('text', '')[:100].replace('\n', ' ')
                  url = t.get('url', '')
                  likes = t.get('likes', 0)
                  
                  print(f"- **{author}** ({likes} likes): {text}...")
                  print(f"  [View tweet]({url})")
                  print()
              
              if len(tweets) > 10:
                  print(f"_...and {len(tweets) - 10} more in the file_")
          except Exception as e:
              print(f"_Error reading pending file: {e}_")
          PYTHONEOF
            
          else
            echo "_No pending tweets_" >> /tmp/pr-body.md
          fi
          
          cat >> /tmp/pr-body.md << 'EOFFOOTER'
          
          ---
          
          ### Review Checklist
          - [ ] Mentions are relevant and add value
          - [ ] Pending tweets reviewed - create new recommendation YAMLs for valuable tools
          
          *Generated by Flux Radar*
          EOFFOOTER

          gh pr create --title "$TITLE" --body-file /tmp/pr-body.md
