name: N-bench Radar

on:
  schedule:
    # Run daily at 9am UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      since_hours:
        description: 'Hours to look back'
        default: '24'
        type: string
      dry_run:
        description: 'Dry run (no PR)'
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install pyyaml
      
      - name: Run X monitor
        id: monitor
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--since ${{ inputs.since_hours || '24' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          # Capture output
          python scripts/monitor.py $ARGS 2>&1 | tee /tmp/monitor.log
          
          # Parse stats from output
          MATCHED=$(grep "Matched to recommendations:" /tmp/monitor.log | grep -oE '[0-9]+' || echo "0")
          PENDING=$(grep "Saved to pending:" /tmp/monitor.log | grep -oE '[0-9]+' || echo "0")
          
          echo "matched=$MATCHED" >> $GITHUB_OUTPUT
          echo "pending=$PENDING" >> $GITHUB_OUTPUT

      - name: Auto-commit social proof (autonomous mode)
        if: inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          MATCHED="${{ steps.monitor.outputs.matched }}"
          PENDING="${{ steps.monitor.outputs.pending }}"
          DATE=$(date +%Y-%m-%d)
          
          git config user.name "N-bench Radar"
          git config user.email "nbench-radar@nairon.ai"
          
          # AUTONOMOUS LOGIC:
          # - If MATCHED > 0: Auto-commit social proof directly to main (valuable)
          # - If MATCHED = 0: Discard pending tweets (noise requiring manual review)
          
          if [ "$MATCHED" -gt 0 ]; then
            echo "Auto-committing $MATCHED validated social proof mentions"
            
            # Only stage recommendation files (not pending/)
            git add -A
            git reset -- pending/ 2>/dev/null || true
            
            # Also update state file
            git add .monitor_state.json 2>/dev/null || true
            
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "radar: auto-add $MATCHED social proof mentions - $DATE"
              git push origin main
              echo "Committed and pushed $MATCHED mentions to main"
            else
              echo "No changes to commit after filtering"
            fi
          else
            echo "No validated mentions found (pending: $PENDING)"
            echo "Discarding pending tweets - they require manual review"
            
            # Only update state file to track seen tweets
            git checkout -- . 2>/dev/null || true
            git add .monitor_state.json 2>/dev/null || true
            
            if [ -n "$(git diff --cached --name-only)" ]; then
              git commit -m "radar: update state (no new mentions) - $DATE"
              git push origin main
            fi
          fi
          
          echo "Radar run complete - fully autonomous, no PR created"
