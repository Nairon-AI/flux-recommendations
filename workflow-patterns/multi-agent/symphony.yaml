- url: https://x.com/ryancarson/status/2034207143453237527
  author: '@ryancarson'
  text: "Okay, explored the codebase more, and this is not a replacement for Symphony.\
    \ \n\nIt lacks the orchestration ability to shepherd issues from to-do to merged.\n\
    \nI think that final version is something like Open SWE + Symphony."
