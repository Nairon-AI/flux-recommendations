  author: '@ryancarson'
  text: "This works well for me:\n\n1. Plan mode in Codex on xHigh \n\n2. Copy markdown\
    \ plan\n\n3. Paste md plan into Linear issue and Symphony takes it all the way\
    \ to human review (or auto merge of low risk)"
  date: '2026-03-16'
