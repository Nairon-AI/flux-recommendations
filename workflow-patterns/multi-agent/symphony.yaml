name: symphony
category: workflow-pattern
tagline: Multi-agent orchestration system for AI-powered code generation
description: Symphony is an open-source system that allows running multiple AI agents
  concurrently to automate software development workflows. The author reports using
  it with 5 concurrent agents to write and ship 100% of their code, integrated with
  Codex and Linear for a complete development pipeline.
