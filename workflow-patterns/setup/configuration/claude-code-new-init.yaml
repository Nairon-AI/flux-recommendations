name: claude-code-new-init
category: workflow-pattern
tagline: Automated Claude Code setup with codebase scanning and configuration
description: A new initialization feature for Claude Code that automatically interviews
  users, scans their codebase, and sets up CLAUDE.md files, skills, and hooks. This
  streamlines the onboarding process for AI-assisted development with Claude Code
  by automating the initial configuration steps.
install:
  type: manual
  command: 'Add "CLAUDE_CODE_NEW_INIT": "1" to settings.json'
verification:
  type: manual
