description: 'A three-tool system (Obsidian + Claude Code + instruction files) that
  gives Claude persistent company knowledge across sessions. Each business topic becomes
  a markdown file in Obsidian with wikilinks connecting related concepts, allowing
  Claude to pull full context on any query without re-explanation.


  **Flux Impact:** This directly solves the ''context amnesia'' problem Flux addresses
  by providing a systematic approach to maintaining persistent business context across
  AI sessions, reducing setup time and improving consistency'
use_cases:
- Document this pattern in workflow-patterns/ai/ as 'persistent-company-context'
- Create a flux:company-context command that scaffolds the Obsidian-style knowledge
  structure
- Add wikilink parsing to the brain vault system for better cross-references
- Build templates for common business knowledge files (team, processes, metrics, etc.)
