name: integration-testing-ai-code
category: workflow-pattern
tagline: Let AI verify its own work through integration tests
description: |
  When working with AI coding assistants, the key question is:
  "How do I allow this agent to check its own work?"
  
  Integration tests are the answer. They provide automated feedback loops
  that catch AI mistakes before you review the code.

  ## The Principle
  
  AI generates code fast but can't verify it works correctly without tests.
  By having comprehensive integration tests, you let the AI:
  - Catch its own mistakes immediately
  - Iterate until tests pass
  - Reduce your role as manual QA

  ## Test Recommendations by Domain

  | Domain | Tool | Why |
  |--------|------|-----|
  | Frontend/UI | Playwright, Stagehand | Visual + interaction verification |
  | Backend/API | Vitest, Jest | Fast, comprehensive unit/integration |
  | NPM libraries | attw, npm publish --dry-run | Package compatibility checks |
  | Copy/paste detection | jscpd | Catch duplicated code |

  ## Implementation

  1. **Set up test infrastructure first** - before AI writes features
  2. **Tell AI to run tests** - "RUN THE TESTS BEFORE SHOWING ME THE CODE"
  3. **Add test commands to CLAUDE.md** - AI knows how to verify
  4. **CI as final backstop** - catch anything AI missed

  ## Example CLAUDE.md Rule
  ```markdown
  Before completing any task:
  1. Run `npm test` and fix any failures
  2. Run `npm run typecheck` 
  3. Only show me code after all checks pass
  ```

use_cases:
  - AI-assisted feature development
  - Reducing manual code review burden
  - Catching AI-generated bugs automatically
  - Building trust in AI-written code

prerequisites:
  - Test framework configured (Vitest, Playwright, etc.)
  - CI pipeline with test runs

install:
  type: manual
  command: |
    # Add to CLAUDE.md:
    
    ## Testing Requirements
    Before completing any code task:
    1. Run `npm test` - all tests must pass
    2. Run `npm run typecheck` - no type errors
    3. For UI changes, run `npm run test:e2e`
    
    DO NOT show me code until all checks pass.

verification:
  type: manual
  success_indicator: AI runs tests automatically and iterates until they pass

resources:
  - url: https://playwright.dev
    type: docs
  - url: https://vitest.dev
    type: docs

