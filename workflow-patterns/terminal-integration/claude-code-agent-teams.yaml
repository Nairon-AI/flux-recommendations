name: claude-code-agent-teams
category: workflow-pattern
tagline: Multi-agent tmux integration for Claude Code with experimental team mode
description: An experimental feature in Claude Code that enables team mode with tmux
  integration, automatically opening additional terminal panes for multi-agent workflows.
  Users can interact with multiple Claude agents simultaneously in separate panes
  rather than having one main orchestrating agent.
install:
  type: manual
  command: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=true claude
verification:
  type: manual
resources: []
tags:
- claude-code
- tmux
- multi-agent
- experimental
- terminal
