name: red-green-tdd-for-coding-agents
category: pattern
tagline: 'Use test-first development with coding agents: write failing tests first,
  then i'
description: 'Red/green TDD is a disciplined test-first development approach where
  you write automated tests first, confirm they fail (red), then iterate on implementation
  until tests pass (green). This pattern is particularly effective with coding agents
  as it prevents non-working code and ensures robust test coverage.


  **Flux Impact:** Strengthens our Agentic SDLC by ensuring AI agents write reliable,
  tested code from the start, reducing debugging cycles and improving code quality'
use_cases:
- Update flux-work skill to enforce test-first development
- Add TDD validation to quality-auditor agent
- Create red-green-tdd skill template with standard prompts
- Add TDD compliance check to flux:impl-review command
