name: worktree-parallel-agents
category: workflow-pattern
tagline: Run parallel AI agents without conflicts using git worktrees
description: |
  Built-in git worktree support in Claude Code enables running multiple AI agents
  in parallel without file conflicts or context interference. Each agent gets
  its own isolated working directory while sharing the same git history.

  ## The Problem

  Traditional workflow when switching tasks:
  ```bash
  git stash push -m "WIP: feature"
  git checkout main
  # do urgent work
  git checkout feature-branch
  git stash pop
  # hope no conflicts...
  # rebuild mental context...
  # wait for Claude to re-understand...
  ```

  This destroys the deep understanding Claude built about your task.

  ## The Solution: Git Worktrees

  With `claude --worktree`:
  - **Instant task switching** - just change directories
  - **Zero context loss** - each session maintains understanding
  - **Complete isolation** - features/bugs don't interfere
  - **Parallel execution** - multiple agents work simultaneously

  ## Usage

  ### CLI Flag
  ```bash
  claude --worktree
  # Creates isolated worktree for this session
  ```

  ### Multiple Parallel Sessions
  ```bash
  # Terminal 1: Feature work
  cd ~/project
  claude --worktree  # Works on feature branch

  # Terminal 2: Urgent bugfix
  cd ~/project
  claude --worktree  # Works on bugfix in separate directory
  ```

  ### Subagent Isolation
  ```yaml
  # .claude/agents/my-agent.md
  ---
  name: parallel-worker
  isolation: worktree
  ---
  ```

  ## How It Works

  Git worktrees attach multiple working directories to one repository:
  ```
  ~/project/              # Main worktree (main branch)
  ~/project-worktrees/
    ├── feature-x/        # Worktree for feature-x branch
    ├── bugfix-123/       # Worktree for bugfix branch
    └── experiment/       # Worktree for experiments
  ```

  Each directory has its own files but shares `.git` data.

use_cases:
  - Parallel feature development with multiple agents
  - Urgent bugfixes without losing feature context
  - A/B testing different implementations
  - Running tests on one branch while coding on another

prerequisites:
  - Claude Code CLI
  - Git repository with at least one commit

install:
  type: manual
  command: |
    # Built into Claude Code - no installation needed
    
    # Use the --worktree flag:
    claude --worktree
    
    # Or configure subagents with isolation:
    # .claude/agents/worker.md
    # ---
    # isolation: worktree
    # ---

verification:
  type: command_exists
  test_command: claude --help | grep worktree
  success_indicator: --worktree flag appears in help output

