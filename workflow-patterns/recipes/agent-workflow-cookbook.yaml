name: agent-workflow-cookbook
category: workflow-pattern
tagline: 40+ tested agent workflow recipes for automating development tasks
description: |
  Comprehensive cookbook containing 40+ battle-tested agent workflow recipes with
  prompts for automating common development tasks. All recipes tested and ready
  to copy and run.
  
  Included workflows:
  - Auto-fix Sentry errors
  - Auto-triage bugs via Linear
  - Auto-investigate Datadog alerts
  - Parallel database migrations
  - Daily design system audits
  - And many more...
  
  Each recipe includes complete prompts and has been validated in production use.
  
