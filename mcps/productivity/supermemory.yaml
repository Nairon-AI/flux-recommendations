name: supermemory
category: mcp
tagline: Long-term memory layer for AI — your second brain
description: |
  Supermemory gives AI persistent memory across sessions. No more re-explaining context.
  
  Automatically extracts and stores relevant information while you chat. 
  Connects to 100+ apps including Claude, Cursor, Warp. Syncs with GitHub, 
  Notion, Google Drive, OneDrive, S3, and web crawlers.
  
  Find implicit connections across your memories with AI-driven knowledge graphs.
use_cases:
- Storing project-specific context that persists
- Remembering user preferences and decisions
- Syncing documentation from GitHub/Notion/Drive
- Building knowledge graphs across projects
- Eliminating "I already told you this" moments
prerequisites:
- Supermemory account (free tier available)
- API key from supermemory.ai
install:
  type: mcp
  command: 'npx -y @anthropic-ai/create-mcp@latest add supermemory --config claude

    '
  config_snippet: "{\n  \"mcpServers\": {\n    \"supermemory\": {\n      \"command\"\
    : \"npx\",\n      \"args\": [\"-y\", \"@supermemory/mcp\"],\n      \"env\": {\n\
    \        \"SUPERMEMORY_API_KEY\": \"your-api-key\"\n      }\n    }\n  }\n}\n"
verification:
  type: mcp_connect
  test_command: Ask Claude to store a memory and then retrieve it
  success_indicator: Successfully stores and retrieves the memory
related_tools: []
resources:
- url: https://supermemory.ai
  type: homepage
- url: https://docs.supermemory.ai
  type: docs
added_date: 2025-02-21
source: manual
source_url: null
ratings:
  usefulness: 5
  setup_difficulty: 2
tags:
- memory
- persistence
- context
- knowledge-base
sdlc_phase: documentation
solves: AI forgets everything between sessions — you re-explain context constantly
pricing:
  model: freemium
  details: Free tier available. Pro plans for teams and API access
