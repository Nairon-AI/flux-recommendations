name: tailwind-copy-matcher
category: cli-tool
tagline: AI that detects content-design mismatches and suggests fixes
description: |
  From Adam Wathan (@adamwathan, Tailwind CSS creator). A tool that analyzes
  the alignment between your written content and design concepts, then suggests
  either copy adjustments or alternative UI patterns.
  
  Key insight: Much of what makes a design look visually great is matching your
  content to a design concept that fits your copy. This tool identifies mismatches
  and helps you fix them.
  
  Installs as part of your Tailwind project and provides real-time feedback.
  
use_cases:
  - Detect content-design mismatches in UI components
  - Get copy suggestions that fit your design better
  - Find alternative UI patterns for your content
  - Improve visual harmony between text and interface

install:
  type: manual
  command: "# See linked tweet for installation"

