description: 'Fonttrio is a shadcn registry extension that provides curated Google
  Font pairs and automates the entire font setup process. Instead of manually picking
  fonts, adding them to layout.tsx, and configuring globals.css for each typography
  element, developers can install complete font combinations with a single command.


  **Flux Impact:** Improves AI agents'' ability to make design decisions quickly during
  implementation phase. Reduces decision paralysis around typography choices and automates
  tedious configuration steps.'
use_cases:
- Add fonttrio to cli-tools/frontend/ recommendations
- Create font-selection skill for AI agents working on UI projects
- Include in shadcn/tailwind workflow patterns
- Add to frontend design fluency skills collection
