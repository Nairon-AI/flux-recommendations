description: 'Crawlee is an open-source Python web scraping library designed to be
  invisible to bot detection systems. It supports multiple scraping backends (BeautifulSoup,
  Playwright, raw HTTP), automatic proxy rotation, session management, and parallel
  crawling with built-in retry mechanisms.


  **Flux Impact:** Enables AI agents to reliably gather web data for research, documentation
  updates, and competitive analysis without being blocked by anti-bot systems'
use_cases:
