name: keep
category: cli-tool
tagline: Convert X/Twitter threads to markdown by bookmarking any tweet
description: |
  Keep lets you turn entire X/Twitter threads into clean markdown by simply 
  bookmarking any post in the thread. Finally do something useful with your 
  bookmarked content.
  
  Perfect for:
  - Saving valuable technical threads as documentation
  - Building context files from X discussions
  - Archiving insights for AI agent context
  - Knowledge management from social media

use_cases:
  - Save technical threads as markdown docs
  - Build agent context from X discussions
  - Archive insights before they disappear
  - Create reference materials from threads

