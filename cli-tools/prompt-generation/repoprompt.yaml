name: repoprompt
category: cli-tool
tagline: Agent that builds prompts for ChatGPT and implements results directly
description: RepoPrompt is a tool that automatically generates prompts for AI coding
  tasks and can implement the AI's responses directly back into your application.
  It acts as an intermediary agent between your codebase and ChatGPT, streamlining
  the workflow of getting AI assistance and applying changes.
