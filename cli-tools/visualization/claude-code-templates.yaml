name: claude-code-templates
category: cli-tool
tagline: Visualize Claude Code Agent Teams workflow and communication patterns
description: A CLI tool that provides visualization of Claude Code's Agent Teams feature,
  showing how the lead agent and team members communicate under the hood. Helps developers
  understand and debug multi-agent workflows in Claude Code development.
install:
  type: npm
  command: npx claude-code-templates@latest --teams
verification:
  type: manual
resources: []
