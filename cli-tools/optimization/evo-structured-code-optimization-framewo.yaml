description: 'Evo is a structured experiment-driven code optimization framework that
  provides a CLI and Claude Code workflow for systematically improving code quality
  through tree-search optimization. It manages experiment state in `.evo/` directory
  and provides `/discover` and `/optimize` commands for iterative improvement.


  **Flux Impact:** Enhances our Agentic SDLC by adding systematic code optimization
  through structured experiments, moving beyond one-shot implementation to iterative
  improvement with measurable results'
