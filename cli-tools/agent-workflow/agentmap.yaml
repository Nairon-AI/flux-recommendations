name: agentmap
category: cli-tool
tagline: Frontmatter comments for code files to help AI agents understand codebases
description: |
  Agentmap adds frontmatter-style comments to the top of code files describing their
  purpose and context, similar to skills but for source code. The file tree structure
  with annotations is then injected at the start of agent context to help AI understand
  the codebase without reading every line of source code.
  
  Key features:
  - Generates descriptive frontmatter comments for code files
  - Creates structured file tree with purpose annotations
  - Reduces context bloat by providing pre-digested codebase overview
  - Similar concept to CLAUDE.md but distributed across files
  
use_cases:
  - Help AI agents navigate unfamiliar codebases faster
  - Reduce context tokens needed for codebase understanding
  - Document file purposes in a format optimized for AI consumption
  - Auto-update documentation after PR merges

install:
  type: manual
  command: "# See: https://github.com/agentmap/agentmap"

verification:
  type: manual

resources:
