description: 'GitNexus creates a local knowledge graph of your codebase, mapping all
  dependencies, call chains, execution flows, and breaking change risks. It integrates
  with Claude Code, Cursor, and Windsurf via MCP to give AI agents complete architectural
  context before making changes.


  **Flux Impact:** Dramatically improves our Agentic SDLC by giving AI agents complete
  dependency awareness before making changes. This addresses the ''blind acceptance''
  problem where agents make changes without understanding downstream impacts. Perfect
  complement to our existing workflow scouts.'
use_cases:
- Research GitNexus GitHub repository and installation process
- Test MCP integration with Claude Code workflow
- Benchmark against existing context-scout and repo-scout capabilities
- Create GitNexus skill for Flux plugin integration
- Document GitNexus setup in Flux improvement recommendations
