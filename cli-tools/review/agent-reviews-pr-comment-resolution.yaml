description: 'agent-reviews provides a CLI and agent skills that automatically handle
  the complete PR review cycle - triaging comments, implementing fixes, replying with
  commit hashes, and watching for new comments. It''s designed specifically for agents
  and supports major review bots like Copilot, CodeRabbit, Cursor, and SonarCloud.


  **Flux Impact:** Significantly improves Code Review phase efficiency by automating
  the review-fix-reply cycle, allowing agents to handle bot reviews autonomously and
  reducing human intervention in iterative review processes.'
use_cases:
