name: review-fast
category: cli-tool
tagline: Self-healing PRs with automated code review and fixes
description: |
  Automated code review tool that doesn't just comment on issues - it fixes them.
  Self-healing PRs that automatically address review feedback.
  
  Instead of back-and-forth review cycles, Review Fast:
  1. Analyzes PR for issues
  2. Generates fixes automatically
  3. Updates the PR with corrections
  
  Reduces review cycles from days to minutes.

