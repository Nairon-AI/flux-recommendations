name: slopcodebench
category: cli-tool
tagline: Benchmark tool for measuring AI code quality degradation
description: |
  SlopCodeBench evaluates how AI-generated code impacts project health over time.
  Specifically targets the problem of overly verbose, defensive AI code that
  accumulates and erodes codebases as requirements evolve.
  
  Key insight: Often bugs are tied directly to overly verbose or defensive code
  from AI agents that has eroded the project as specs changed.
  
  Use cases:
  - Measure code bloat from AI implementations
  - Detect defensive coding patterns that reduce maintainability
  - Track project health degradation over time
  - Validate anti-slop patterns are working
  
use_cases:
  - Quality gate after AI implementations
  - Detect code bloat before it accumulates
  - Validate AI code quality over iterations
  - Pre-commit hooks for slop detection

install:
  type: manual
  command: "# See: https://github.com/GOrlanski/SlopCodeBench"

verification:
  type: manual

resources:
