name: bun
category: cli-tool
tagline: Fast JavaScript runtime with secure package management defaults
description: Bun is a fast all-in-one JavaScript runtime and package manager that
  blocks postinstall scripts by default, providing built-in protection against supply-chain
  attacks. This security-first approach makes it valuable for AI-assisted development
  where automated dependency installation could expose projects to malicious scripts.
install:
  type: manual
  command: curl -fsSL https://bun.sh/install | bash
verification:
  type: manual
resources:
- url: https://bun.sh
  type: homepage
- url: https://github.com/oven-sh/bun
  type: github
tags:
- javascript
- package-manager
- security
- runtime
